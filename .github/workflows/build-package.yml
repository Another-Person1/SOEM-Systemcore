name: Build Package

on:
  push:
    branches:
      - main

jobs:
  build-ipk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM64 toolchain and packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-aarch64-linux-gnu \
            cmake \
            ninja-build \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Set up opkg-utils
        run: |
          git clone --depth 1 https://git.yoctoproject.org/opkg-utils opkg-utils || \
            git clone --depth 1 https://github.com/shr-project/opkg-utils.git opkg-utils
          echo "$(pwd)/opkg-utils" >> $GITHUB_PATH

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure daemon
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
        run: |
          cmake -S . -B build/daemon -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DLIMELIGHT_EC_WITH_WPILIB=OFF \
            -DLIMELIGHT_EC_FULLY_STATIC=OFF

      - name: Build daemon
        run: |
          cmake --build build/daemon --target ec-systemcore-daemon
          aarch64-linux-gnu-readelf -h build/daemon/daemon/ec-systemcore-daemon | grep -q 'Machine:[[:space:]]*AArch64'

      - name: Build IPK
        run: |
          test -f scripts/build_ipk.sh
          chmod +x scripts/build_ipk.sh
          ./scripts/build_ipk.sh

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ec-systemcore-ipk
          path: dist/*.ipk
