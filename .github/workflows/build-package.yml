name: Build Package

on:
  push:
    branches:
      - main

jobs:
  build-ipk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM64 toolchain and packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            opkg-utils

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure daemon
        run: |
          cmake -S . -B build/daemon -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIMELIGHT_EC_WITH_WPILIB=OFF \
            -DLIMELIGHT_EC_FULLY_STATIC=OFF

      - name: Build daemon
        run: cmake --build build/daemon --target ec-systemcore-daemon

      - name: Build IPK
        run: |
          chmod +x scripts/build_ipk.sh
          ./scripts/build_ipk.sh

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ec-systemcore-ipk
          path: dist/*.ipk
